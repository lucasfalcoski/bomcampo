name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (if script exists)
        shell: bash
        run: |
          bun -e "const s=require('./package.json').scripts||{};process.exit(s.lint?0:1)" \
            && bun run lint \
            || echo "skip lint (no script)"

      - name: Typecheck (if script exists)
        shell: bash
        run: |
          bun -e "const s=require('./package.json').scripts||{};process.exit(s.typecheck?0:1)" \
            && bun run typecheck \
            || echo "skip typecheck (no script)"

      - name: Test (if script exists)
        shell: bash
        run: |
          bun -e "const s=require('./package.json').scripts||{};process.exit(s.test?0:1)" \
            && bun run test \
            || echo "skip test (no script)"

      - name: Build
        run: bun run build

      - name: Upload dist artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore
