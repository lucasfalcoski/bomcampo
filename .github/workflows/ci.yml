name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (if script exists)
        run: |
          node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint?0:1)" \
            && bun run lint \
            || echo "skip lint"

      - name: Typecheck (if script exists)
        run: |
          node -e "const s=require('./package.json').scripts||{}; process.exit(s.typecheck?0:1)" \
            && bun run typecheck \
            || echo "skip typecheck"

      - name: Test (if script exists)
        run: |
          node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)" \
            && bun run test \
            || echo "skip test"

      - name: Build (if script exists)
        run: |
          node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)" \
            && bun run build \
            || echo "skip build"
