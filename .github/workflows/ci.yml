name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Lint (optional)
        shell: bash
        run: |
          if bun run | grep -qE '^\s*lint\b'; then
            bun run lint
          else
            echo "skip lint"
          fi

      - name: Typecheck (optional)
        shell: bash
        run: |
          if bun run | grep -qE '^\s*typecheck\b'; then
            bun run typecheck
          else
            echo "skip typecheck"
          fi

      - name: Test (optional)
        shell: bash
        run: |
          if bun run | grep -qE '^\s*test\b'; then
            bun run test
          else
            echo "skip test"
          fi

      - name: Build (optional)
        shell: bash
        run: |
          if bun run | grep -qE '^\s*build\b'; then
            bun run build
          else
            echo "skip build"
          fi
