name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node dá compatibilidade total (mesmo usando Bun)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (if script exists)
        shell: bash
        run: |
          node -e "const s=require('./package.json').scripts||{};process.exit(s.lint?0:1)" \
            && bun run lint \
            || echo "skip lint (no script)"

      - name: Typecheck (if script exists)
        shell: bash
        run: |
          node -e "const s=require('./package.json').scripts||{};process.exit(s.typecheck?0:1)" \
            && bun run typecheck \
            || echo "skip typecheck (no script)"

      - name: Test (if script exists)
        shell: bash
        run: |
          node -e "const s=require('./package.json').scripts||{};process.exit(s.test?0:1)" \
            && bun run test \
            || echo "skip test (no script)"

      - name: Build
        run: bun run build
