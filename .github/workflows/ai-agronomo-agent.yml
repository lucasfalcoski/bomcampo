name: Agente Fala AI Agrônomo

on:
  schedule:
    - cron: "0 9 * * 1,4"   # Segunda e quinta às 9h UTC = 6h BRT
  push:
    paths:
      - "supabase/functions/ai-ask/index.ts"
  workflow_dispatch:

jobs:
  agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar git
        run: |
          git config --global user.name "agente-ai-agronomo[bot]"
          git config --global user.email "agente@bomcampo.app.br"
          git config --global --add safe.directory /home/runner/work/bomcampo/bomcampo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install --save-dev tsx typescript @types/node

      - name: Criar pastas necessárias
        run: mkdir -p reports patches

      - name: Gerar novas perguntas
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/generate-questions.ts --count=20 2>&1 | tee reports/generate-run.txt
        continue-on-error: true

      - name: Rodar banco de testes sintéticos
        id: test
        run: |
          npx tsx scripts/test-intents.ts 2>&1 | tee reports/ci-run.txt
          SCORE=$(grep -o '[0-9]*%' reports/ci-run.txt | head -1 || echo "0%")
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Verificar se há gaps
        id: check_gaps
        run: |
          if grep -q "GAPS DETECTADOS" reports/ci-run.txt; then
            echo "has_gaps=true" >> $GITHUB_OUTPUT
            GAP_COUNT=$(grep -c "^\[" reports/ci-run.txt || echo "0")
            echo "gap_count=$GAP_COUNT" >> $GITHUB_OUTPUT
          else
            echo "has_gaps=false" >> $GITHUB_OUTPUT
            echo "gap_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Aplicar patches no ai-ask
        if: steps.check_gaps.outputs.has_gaps == 'true'
        run: npx tsx scripts/agent.ts 2>&1 | tee reports/agent-run.txt

      - name: Verificar mudanças
        id: check_changes
        run: |
          git diff --quiet && git diff --staged --quiet && echo "has_changes=false" >> $GITHUB_OUTPUT || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commitar mudanças
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "agente-ai-agronomo[bot]"
          git config user.email "agente@bomcampo.app.br"
          git add scripts/test-intents.ts supabase/functions/ai-ask/index.ts reports/
          git commit -m "feat(ai-ask): agente — score ${{ steps.test.outputs.score }}, ${{ steps.check_gaps.outputs.gap_count }} gap(s)"

      - name: Abrir Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "fix/ai-agronomo-${{ github.run_number }}"
          title: "🤖 [${{ steps.test.outputs.score }}] Agente: novas perguntas + ${{ steps.check_gaps.outputs.gap_count }} gap(s)"
          body: |
            ## Ciclo automático — Fala AI Agrônomo

            **Score:** ${{ steps.test.outputs.score }}
            **Gaps corrigidos:** ${{ steps.check_gaps.outputs.gap_count }}

            ### O que foi feito
            1. Gerou novas perguntas via Claude API (POPs + logs reais do Supabase)
            2. Rodou banco de testes completo
            3. Detectou e corrigiu gaps de roteamento no ai-ask

            ### Antes de fazer merge
            - [ ] Revisar perguntas em `scripts/test-intents.ts`
            - [ ] Revisar regex em `supabase/functions/ai-ask/index.ts`
            - [ ] Confirmar que nenhum padrão de defensivos foi alterado
            - [ ] Score >= 90%

            ---
            *Agente de Melhoria Contínua — Bom Campo*
          labels: "ai-agronomo,automated"
          draft: false

      - name: Tudo OK
        if: steps.check_changes.outputs.has_changes == 'false'
        run: echo "✅ Score ${{ steps.test.outputs.score }} — nenhuma mudança necessária."
